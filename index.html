<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>票税帮·一站式票税综合服务平台</title>
    <meta name="description" content="票税帮，一站式票税综合服务平台，即将上线，敬请期待">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: PingFang SC, Microsoft YaHei, Roboto, sans-serif;
        }

        /* 全局页面样式 - 全屏居中单区块布局 */
        body {
            width: 100vw;
            height: 100vh;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 主内容容器 */
        .launch-container {
            text-align: center;
            padding: 0 20px;
        }

        /* 品牌名称样式 */
        .brand-name {
            font-size: 24px;
            font-weight: 600;
            color: #1677FF;
            margin-bottom: 32px;
        }

        /* 副标题说明样式 */
        .sub-title {
            font-size: 16px;
            color: #666666;
            margin-bottom: 48px;
            line-height: 1.6;
        }

        /* 核心按钮样式 */
        .enter-btn {
            display: inline-block;
            padding: 14px 48px;
            background-color: #1677FF;
            color: #FFFFFF;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        /* 按钮hover交互效果 */
        .enter-btn:hover {
            background-color: #0958d9;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(22, 119, 255, 0.3);
        }

        /* 底部版权信息 */
        .copyright {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            font-size: 12px;
            color: #666666;
            text-align: center;
        }

        /* 移动端自适应适配 */
        @media (max-width: 768px) {
            .brand-name {
                font-size: 20px;
            }
            .enter-btn {
                padding: 12px 36px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="launch-container">
        <!-- 品牌头部 -->
        <div class="brand-name">票税帮·一站式票税综合服务平台</div>
        
        <!-- 核心文案区 -->
        <p class="sub-title">票税一体化智能服务，助力企业高效合规办税</p>
        
        <!-- 核心操作区 -->
        <button class="enter-btn" id="enterBtn">立即进入</button>
    </div>

    <!-- 底部辅助区 -->
    <div class="copyright">©2026 票税帮 版权所有 一站式票税综合服务平台</div>

    <script>
        // 页面加载完成 0秒瞬时跳转（无任何延迟）
        window.onload = function(){
            window.location.href = "https://f5b1sirz56cm.meoo.info/";
        }
        // 按钮点击立即跳转
        const enterBtn = document.getElementById('enterBtn');
        enterBtn.addEventListener('click', function() {
            window.location.href = "https://f5b1sirz56cm.meoo.info/";
        });
    </script>
</body>
</html>
